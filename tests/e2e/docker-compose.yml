services:
  vaultwarden:
    image: vaultwarden/server:1.34.5-alpine
    container_name: clavix-e2e-vaultwarden
    environment:
      DOMAIN: http://127.0.0.1:8000
      SIGNUPS_ALLOWED: "true"
      INVITATIONS_ALLOWED: "true"
      SHOW_PASSWORD_HINT: "false"
      WEB_VAULT_ENABLED: "false"
      LOG_LEVEL: warn
      # Short PBKDF2 iterations keep test login time under 500ms. Production
      # defaults (600000) would make every E2E run wait seconds per unlock
      # for no added signal — the crypto surface we test is the same either way.
      PASSWORD_ITERATIONS: "100000"
    ports:
      - "8000:80"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/alive"]
      interval: 2s
      timeout: 2s
      retries: 30
