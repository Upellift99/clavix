name: Bug report
description: Something in Clavix does not work as expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Do not** use this form for security vulnerabilities — use a
        [private Security Advisory](https://github.com/Upellift99/clavix/security/advisories/new)
        instead.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I drag a cipher from … to …, the detail panel shows …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      placeholder: |
        1. Unlock the vault
        2. Click "Resync"
        3. …
    validations:
      required: true

  - type: input
    id: clavix-version
    attributes:
      label: Clavix version
      description: Found in the Infos modal, or from the release you downloaded.
      placeholder: "v0.1.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux (AppImage)
        - Linux (.deb / .rpm)
        - Linux (built from source)
        - macOS
        - Windows
        - other
    validations:
      required: true

  - type: input
    id: vaultwarden
    attributes:
      label: Vaultwarden / Bitwarden server version
      placeholder: "Vaultwarden 1.35.0"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Anything useful from the terminal (if running `pnpm tauri dev`)
        or the devtools console. Scrub any credentials first.
      render: shell
