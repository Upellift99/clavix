name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            tauri-target: ""
            artifact-name: linux
          - platform: macos-14
            tauri-target: "--target universal-apple-darwin"
            artifact-name: macos
          - platform: windows-latest
            tauri-target: ""
            artifact-name: windows
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: "Clavix ${{ steps.tag.outputs.value }}"
          releaseBody: |
            Automated release built by GitHub Actions.

            Artifacts :
            - `.AppImage` : portable Linux binary, double-click to run
            - `.deb` : Debian / Ubuntu package (`sudo dpkg -i`)
            - `.rpm` : Fedora / openSUSE package
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-target }}

      - name: Upload artifacts (fallback if release step fails)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clavix-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 14

  # Posts a release notification to a Discord channel after every
  # platform-build job has succeeded. Silently no-ops when the secret
  # is unset (forks, manual dry-runs) so the workflow itself never
  # fails on the notification step.
  notify:
    name: Notify Discord
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          TAG: ${{ steps.tag.outputs.value }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        shell: bash
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL is not set — skipping notification."
            exit 0
          fi

          # CHANGELOG sections are headed with `## [X.Y.Z]`. Strip the
          # leading "v" from the tag to match. Pull the lines between
          # this version's header and the next one, capped at 80 lines
          # so we stay well below Discord's 4096-char description limit
          # without risking a mid-UTF-8-codepoint truncation.
          VERSION="${TAG#v}"
          HIGHLIGHTS=$(awk -v ver="$VERSION" '
            BEGIN { found = 0; lines = 0 }
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found && lines < 80 { print; lines++ }
          ' CHANGELOG.md)

          if [ -z "$(printf '%s' "$HIGHLIGHTS" | tr -d '[:space:]')" ]; then
            HIGHLIGHTS="(see CHANGELOG.md for the full list)"
          fi

          # 0x175DDC = 1531356, the Bitwarden brand blue, kept in sync
          # with the in-app accent so the notification visually matches
          # the client.
          PAYLOAD=$(jq -n \
            --arg title "Clavix ${TAG} released" \
            --arg url "${REPO_URL}/releases/tag/${TAG}" \
            --arg desc "$HIGHLIGHTS" \
            '{embeds: [{title: $title, url: $url, description: $desc, color: 1531356}]}')

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            --data-raw "$PAYLOAD" \
            "$WEBHOOK"
