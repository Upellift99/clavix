name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt + clippy + audit)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (lib)
        run: cargo test --lib --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # RUSTSEC-2023-0071 : Marvin Attack sur le crate `rsa` (timing side-channel
      # sur le déchiffrement RSA-OAEP). Pas de fix upstream disponible à ce jour.
      # Notre exposition est faible : déchiffrement d'org keys une fois par sync,
      # HTTPS vers Vaultwarden, pas d'oracle exposé à un attaquant. À retirer dès
      # que le crate `rsa` publie une version constant-time.
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  frontend:
    name: Frontend (svelte-check)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm check

      - name: Unit tests (vitest)
        run: pnpm test

  e2e:
    name: E2E (Tauri + WebdriverIO)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # 6 specs green on two successive CI runs (4-then-6) in the 30-60 s
    # window. Promoted from observational to blocking: a new red here
    # is a real regression worth stopping a merge on. If we see
    # flakes on CI later, first look at the uploaded
    # `e2e-screenshots` artifact before reverting this line.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri + WebDriver system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install tauri-driver
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-driver

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Clavix (debug)
        run: pnpm tauri build --debug --no-bundle

      - name: Run E2E suite
        # E2E_PER_SPEC_RESET=1 makes the suite wipe + reseed Vaultwarden
        # between specs. Slower (~3 min added) but the only way to keep
        # late-position specs from inheriting the accumulated state of
        # earlier ones. See issue #25.
        env:
          E2E_PER_SPEC_RESET: "1"
        run: xvfb-run -a pnpm test:e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7

  smoke-release:
    name: Smoke E2E (release build)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Why a separate release-build smoke job exists: the main e2e job
    # builds with `--debug`, where Tauri does not enforce the release
    # CSP. v0.1.11 shipped a blank-window .deb because the strict
    # release CSP nuked the SvelteKit bootstrap and no spec ever ran
    # against a release binary. This job rebuilds in release and runs
    # smoke.spec only — enough to assert that the Svelte tree
    # hydrates under the production CSP, not enough to inflate CI
    # time with a full suite.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri + WebDriver system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release

      - name: Install tauri-driver
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-driver

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Clavix (release)
        run: pnpm tauri build --no-bundle

      - name: Run smoke spec against release binary
        env:
          E2E_BUILD_PROFILE: release
          E2E_SKIP_SEED: "1"
        run: |
          xvfb-run -a pnpm exec wdio run tests/e2e/wdio.conf.mjs \
            --spec tests/e2e/specs/smoke.spec.mjs

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-release-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7
