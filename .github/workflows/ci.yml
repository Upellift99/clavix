name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt + clippy + audit)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (lib)
        run: cargo test --lib --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # RUSTSEC-2023-0071 : Marvin Attack sur le crate `rsa` (timing side-channel
      # sur le déchiffrement RSA-OAEP). Pas de fix upstream disponible à ce jour.
      # Notre exposition est faible : déchiffrement d'org keys une fois par sync,
      # HTTPS vers Vaultwarden, pas d'oracle exposé à un attaquant. À retirer dès
      # que le crate `rsa` publie une version constant-time.
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  frontend:
    name: Frontend (svelte-check)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm check

      - name: Unit tests (vitest)
        run: pnpm test
