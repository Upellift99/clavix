version: 2

updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps-rust)"
    # Ignore semver-major bumps for crates that depend on the same
    # `digest 0.10` / `rand_core 0.6` slice as `rsa 0.9` (our stable).
    # Bumping any one of them breaks the other six because `rsa` still
    # carries the old traits. Lift these entries the moment `rsa 0.10`
    # ships stable on crates.io — Dependabot will then re-open all the
    # major bumps as one coherent group via the `rust-crypto` group
    # below. Past blocked attempts: PR #31 (group bump), PR #35 (rand).
    ignore:
      - dependency-name: rand
        update-types: ["version-update:semver-major"]
      - dependency-name: sha2
        update-types: ["version-update:semver-major"]
      - dependency-name: sha1
        update-types: ["version-update:semver-major"]
      - dependency-name: hmac
        update-types: ["version-update:semver-major"]
      - dependency-name: hkdf
        update-types: ["version-update:semver-major"]
      - dependency-name: pbkdf2
        update-types: ["version-update:semver-major"]
      - dependency-name: aes
        update-types: ["version-update:semver-major"]
      - dependency-name: cbc
        update-types: ["version-update:semver-major"]
    groups:
      rust-crypto:
        patterns:
          - aes
          - cbc
          - hmac
          - hkdf
          - pbkdf2
          - argon2
          - rsa
          - sha1
          - sha2
      rust-core:
        patterns:
          - serde*
          - thiserror
          - reqwest
          - tokio*
          - url
          - uuid
      tauri:
        patterns:
          - tauri*

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps-npm)"
    # Ignore semver-major bumps for `@wdio/*`: the runtime plugin
    # loader rejects mismatched majors across the cli / local-runner /
    # mocha-framework / spec-reporter set, so a single-package major
    # always lands E2E red. Past blocked attempt: PR #43 (mocha-framework
    # 7→9 alone). When we choose to upgrade the whole family, lift this
    # entry and let the `wdio` group below batch the bump.
    ignore:
      - dependency-name: "@wdio/*"
        update-types: ["version-update:semver-major"]
    groups:
      svelte:
        patterns:
          - svelte*
          - "@sveltejs/*"
      tauri-npm:
        patterns:
          - "@tauri-apps/*"
      paraglide:
        patterns:
          - "@inlang/*"
      wdio:
        patterns:
          - "@wdio/*"
          - webdriverio

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps-ci)"
